<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>Virtual Hedge Fund</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: {
              950: '#07070b',
              900: '#0a0a0f',
              800: '#12121a',
              700: '#1a1a26',
              600: '#242433',
            },
            neon: {
              green: '#22c55e',
              red: '#ef4444',
              amber: '#f59e0b',
              cyan: '#22d3ee',
            }
          },
          fontFamily: {
            sans: ['ui-sans-serif', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'sans-serif'],
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.55); }
      50% { opacity: 0.85; box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
    }
    .live-dot {
      animation: pulse-dot 1.6s ease-in-out infinite;
    }
    body {
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(34, 197, 94, 0.08), transparent 50%),
        radial-gradient(900px 500px at 100% 0%, rgba(34, 211, 238, 0.06), transparent 45%),
        #0a0a0f;
    }
  </style>
</head>
<body class="h-full min-h-screen text-zinc-100 font-sans antialiased">
  <div class="mx-auto max-w-lg md:max-w-2xl px-4 pt-6 pb-16 sm:px-6">

    <!-- Status bar -->
    <header class="flex items-center justify-between mb-8">
      <div>
        <p class="text-[11px] uppercase tracking-[0.2em] text-zinc-500 font-medium">Virtual Hedge Fund</p>
        <h1 class="text-lg sm:text-xl font-semibold text-zinc-100 mt-0.5">Paper Portfolio</h1>
      </div>
      <div id="status-pill"
           class="flex items-center gap-2 rounded-full bg-ink-800/80 border border-ink-600 px-3 py-1.5 backdrop-blur">
        <span class="live-dot inline-block h-2.5 w-2.5 rounded-full bg-neon-green"></span>
        <span class="text-xs font-medium text-neon-green tracking-wide">System Live</span>
      </div>
    </header>

    <!-- Portfolio hero -->
    <section class="rounded-2xl border border-ink-600 bg-ink-800/60 p-5 sm:p-6 mb-5 shadow-xl shadow-black/30">
      <p class="text-xs uppercase tracking-widest text-zinc-500 mb-1">Total Portfolio Value</p>
      <p id="portfolio-value"
         class="text-4xl sm:text-5xl font-semibold tracking-tight tabular-nums text-white">
        $—
      </p>
      <div class="mt-5 grid grid-cols-2 gap-3">
        <div class="rounded-xl bg-ink-900/70 border border-ink-600 px-3 py-3">
          <p class="text-[10px] uppercase tracking-wider text-zinc-500">Buying Power</p>
          <p id="buying-power" class="mt-1 text-lg font-medium tabular-nums text-zinc-100">$—</p>
        </div>
        <div class="rounded-xl bg-ink-900/70 border border-ink-600 px-3 py-3">
          <p class="text-[10px] uppercase tracking-wider text-zinc-500">Realized PnL</p>
          <p id="realized-pnl" class="mt-1 text-lg font-medium tabular-nums text-zinc-100">$—</p>
        </div>
      </div>
      <p id="last-refresh" class="mt-4 text-[11px] text-zinc-600 font-mono">Waiting for data…</p>
    </section>

    <!-- Active positions -->
    <section>
      <div class="flex items-center justify-between mb-3 px-0.5">
        <h2 class="text-sm font-semibold text-zinc-300 tracking-wide">Active Positions</h2>
        <span id="trade-count"
              class="text-[11px] font-mono text-zinc-500 bg-ink-800 border border-ink-600 rounded-full px-2 py-0.5">
          0
        </span>
      </div>
      <div id="positions-list" class="space-y-3">
        <div class="rounded-xl border border-dashed border-ink-600 bg-ink-800/40 px-4 py-8 text-center text-sm text-zinc-500">
          Loading positions…
        </div>
      </div>
    </section>

    <footer class="mt-10 text-center text-[11px] text-zinc-600">
      Refreshes every 10s · Virtual ledger (SQLite)
    </footer>
  </div>

  <script>
    const REFRESH_MS = 10000;
    const CONTRACT_MULT = 100;

    function money(n, { signed = false } = {}) {
      if (n === null || n === undefined || Number.isNaN(Number(n))) return '—';
      const v = Number(n);
      const abs = Math.abs(v).toLocaleString('en-US', {
        style: 'currency',
        currency: 'USD',
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      });
      if (signed && v > 0) return '+' + abs;
      if (v < 0) return '-' + abs.replace('-', '');
      return abs;
    }

    function pnlColorClass(n) {
      const v = Number(n);
      if (Number.isNaN(v) || v === 0) return 'text-zinc-100';
      return v > 0 ? 'text-neon-green' : 'text-neon-red';
    }

    function setText(id, text) {
      const el = document.getElementById(id);
      if (el) el.textContent = text;
    }

    function setHtml(id, html) {
      const el = document.getElementById(id);
      if (el) el.innerHTML = html;
    }

    function estimatedActiveValue(trades) {
      if (!Array.isArray(trades)) return 0;
      return trades.reduce((sum, t) => {
        const px = Number(t.entry_price ?? t.entry_premium ?? 0);
        if (!Number.isFinite(px) || px <= 0) return sum;
        return sum + px * CONTRACT_MULT;
      }, 0);
    }

    function directionBadge(dir) {
      const d = String(dir || '—').toUpperCase();
      const isCall = d === 'CALL' || d === 'LONG';
      const isPut = d === 'PUT' || d === 'SHORT';
      const cls = isCall
        ? 'bg-emerald-500/15 text-emerald-400 border-emerald-500/30'
        : isPut
          ? 'bg-rose-500/15 text-rose-400 border-rose-500/30'
          : 'bg-zinc-500/15 text-zinc-400 border-zinc-500/30';
      return `<span class="inline-flex items-center rounded-md border px-1.5 py-0.5 text-[10px] font-semibold tracking-wide ${cls}">${d}</span>`;
    }

    function renderPositions(trades) {
      const list = document.getElementById('positions-list');
      const countEl = document.getElementById('trade-count');
      if (!list) return;

      if (!Array.isArray(trades) || trades.length === 0) {
        list.innerHTML = `
          <div class="rounded-xl border border-dashed border-ink-600 bg-ink-800/40 px-4 py-8 text-center">
            <p class="text-sm text-zinc-500">No open positions</p>
            <p class="text-[11px] text-zinc-600 mt-1">The macro bot will paper-buy on EXECUTE</p>
          </div>`;
        if (countEl) countEl.textContent = '0';
        return;
      }

      if (countEl) countEl.textContent = String(trades.length);

      list.innerHTML = trades.map((t) => {
        const ticker = t.ticker || '?';
        const dir = t.direction || (t.option_contract && t.option_contract.direction) || '—';
        const entry = t.entry_price ?? t.entry_premium;
        const strike = t.strike ?? (t.option_contract && t.option_contract.strike);
        const exp = t.expiration ?? (t.option_contract && t.option_contract.expiration) || '—';
        const tp = t.take_profit ?? t.target_price;
        const sl = t.stop_loss;
        const trail = t.trailing_stop;
        const capital = (Number(entry) || 0) * CONTRACT_MULT;
        const entryTime = t.entry_timestamp || t.entry_time || '';

        return `
          <article class="rounded-xl border border-ink-600 bg-ink-800/70 p-4 shadow-lg shadow-black/20">
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0">
                <div class="flex items-center gap-2 flex-wrap">
                  <span class="text-lg font-semibold tracking-tight text-white">${ticker}</span>
                  ${directionBadge(dir)}
                </div>
                <p class="mt-1 text-[11px] text-zinc-500 font-mono truncate">
                  ${strike != null ? 'Strike ' + strike : '—'}
                  · Exp ${exp}
                </p>
              </div>
              <div class="text-right shrink-0">
                <p class="text-[10px] uppercase tracking-wider text-zinc-500">Entry</p>
                <p class="text-base font-medium tabular-nums text-zinc-100">${money(entry)}</p>
              </div>
            </div>
            <div class="mt-3 grid grid-cols-3 gap-2 text-center">
              <div class="rounded-lg bg-ink-900/60 px-2 py-2">
                <p class="text-[9px] uppercase tracking-wider text-zinc-600">Capital</p>
                <p class="text-xs font-medium tabular-nums text-zinc-300 mt-0.5">${money(capital)}</p>
              </div>
              <div class="rounded-lg bg-ink-900/60 px-2 py-2">
                <p class="text-[9px] uppercase tracking-wider text-zinc-600">TP</p>
                <p class="text-xs font-medium tabular-nums text-neon-green mt-0.5">${money(tp)}</p>
              </div>
              <div class="rounded-lg bg-ink-900/60 px-2 py-2">
                <p class="text-[9px] uppercase tracking-wider text-zinc-600">SL</p>
                <p class="text-xs font-medium tabular-nums text-neon-red mt-0.5">${money(sl)}</p>
              </div>
            </div>
            ${trail != null ? `
              <p class="mt-2 text-[11px] text-neon-amber font-mono">Trail: ${money(trail)}</p>
            ` : ''}
            ${entryTime ? `
              <p class="mt-2 text-[10px] text-zinc-600 font-mono truncate">In @ ${entryTime}</p>
            ` : ''}
          </article>`;
      }).join('');
    }

    async function fetchJson(url) {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(url + ' → ' + res.status);
      return res.json();
    }

    async function refreshDashboard() {
      try {
        const [portfolio, trades, status] = await Promise.all([
          fetchJson('/api/portfolio'),
          fetchJson('/api/active_trades'),
          fetchJson('/api/status'),
        ]);

        const bp = Number(portfolio.buying_power);
        const realized = Number(portfolio.total_realized_pnl);
        const activeVal = estimatedActiveValue(trades);
        const total = (Number.isFinite(bp) ? bp : 0) + activeVal;

        setText('portfolio-value', money(total));
        setText('buying-power', money(bp));

        const pnlEl = document.getElementById('realized-pnl');
        if (pnlEl) {
          pnlEl.textContent = money(realized, { signed: true });
          pnlEl.className = 'mt-1 text-lg font-medium tabular-nums ' + pnlColorClass(realized);
        }

        renderPositions(trades);

        // Status pill
        const live = status && status.status === 'live';
        const pill = document.getElementById('status-pill');
        if (pill) {
          const label = pill.querySelector('span:last-child');
          const dot = pill.querySelector('.live-dot, span:first-child');
          if (live) {
            if (label) {
              label.textContent = 'System Live';
              label.className = 'text-xs font-medium text-neon-green tracking-wide';
            }
            if (dot) {
              dot.className = 'live-dot inline-block h-2.5 w-2.5 rounded-full bg-neon-green';
            }
          } else {
            if (label) {
              label.textContent = 'Offline';
              label.className = 'text-xs font-medium text-zinc-400 tracking-wide';
            }
            if (dot) {
              dot.className = 'inline-block h-2.5 w-2.5 rounded-full bg-zinc-500';
            }
          }
        }

        const ts = status && status.timestamp
          ? new Date(status.timestamp).toLocaleString()
          : new Date().toLocaleString();
        setText('last-refresh', 'Updated ' + ts);
      } catch (err) {
        console.error('Dashboard refresh failed', err);
        setText('last-refresh', 'Refresh error — retrying…');
        const pill = document.getElementById('status-pill');
        if (pill) {
          const label = pill.querySelector('span:last-child');
          if (label) {
            label.textContent = 'Reconnecting';
            label.className = 'text-xs font-medium text-neon-amber tracking-wide';
          }
        }
      }
    }

    refreshDashboard();
    setInterval(refreshDashboard, REFRESH_MS);
  </script>
</body>
</html>
